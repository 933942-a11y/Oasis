<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>po.games</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2 family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #0f0f15;
      --bg-gradient-end: #050508;
      --panel-bg: rgba(18, 18, 24, 0.75);
      --panel-hover: rgba(30, 30, 42, 0.9);
      --text: #ffffff;
      --text-soft: #94a3b8;
      --accent: #f59e0b;
      --accent-glow: rgba(245, 158, 11, 0.25);
      --border-light: rgba(255, 255, 255, 0.07);
      --border-hover: rgba(255, 255, 255, 0.18);
      --shadow-soft: 0 24px 48px rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top center, var(--bg-gradient-start), var(--bg-gradient-end) 95%);
      z-index: -2;
      pointer-events: none;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
      background-color: var(--bg-gradient-end);
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      background: rgba(10, 10, 14, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border-light);
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-controls-left {
      position: absolute;
      left: 32px;
      display: flex;
      gap: 12px;
    }

    .mobile-toggle-btn, .settings-toggle-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-light);
      color: var(--text-soft);
      width: 44px;
      height: 44px;
      border-radius: 14px;
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mobile-toggle-btn:hover, .mobile-toggle-btn.active,
    .settings-toggle-btn:hover, .settings-toggle-btn.active {
      color: var(--accent);
      background: rgba(245, 158, 11, 0.08);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-soft);
      padding: 10px 22px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-btn.active {
      color: #000000;
      background: var(--accent);
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.35);
    }

    .view-content {
      display: none;
      width: 100%;
      max-width: 1200px;
      padding: 60px 24px;
      z-index: 10;
      flex-direction: column;
      align-items: center;
    }

    .view-content.active {
      display: flex;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 8, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(12px);
    }

    .loader.show { display: flex; }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(245, 158, 11, 0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;    
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .title-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 3rem;
      gap: 8px;
    }

    .title {
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #ffffff 30%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .clock-display {
      font-size: 5.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
      background: linear-gradient(180deg, #ffffff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 50px rgba(255, 255, 255, 0.03);
    }

    .date-display {
      font-size: 1.2rem;
      color: var(--text-soft);
      margin-bottom: 3.5rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .quick-stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      width: 100%;
      max-width: 400px;
    }

    .stat-card {
      background: var(--panel-bg);
      border: 1px solid var(--border-light);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      backdrop-filter: blur(20px);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    .stat-card i {
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .stat-card div {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .stat-card p {
      font-size: 0.9rem;
      color: var(--text-soft);
      font-weight: 500;
    }

    .mobile-controls-overlay {
      position: fixed;
      inset: 0;
      z-index: 1500;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 40px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .mobile-controls-overlay.visible {
      opacity: 1;
    }

    .mobile-controls-overlay.game-running {
      position: fixed;
      z-index: 2500;
    }

    .dpad, .action-buttons {
      pointer-events: auto;
      display: grid;
      user-select: none;
    }

    .dpad {
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
    }

    .dpad-btn {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.1s;
    }
    .dpad-btn:active, .dpad-btn.active-press { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(0.95); }
    .dpad-up { grid-column: 2; grid-row: 1; }
    .dpad-left { grid-column: 1; grid-row: 2; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down { grid-column: 2; grid-row: 3; }

    .action-buttons {
      grid-template-columns: repeat(2, 60px);
      gap: 16px;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .action-btn {
      width: 60px;
      height: 60px;
      background: rgba(245, 158, 11, 0.08);
      backdrop-filter: blur(12px);
      border: 2px solid var(--accent);
      color: #fff;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.1s;
    }
    .action-btn span.btn-sub {
      font-size: 0.65rem;
      opacity: 0.8;
    }
    .action-btn:active, .action-btn.active-press { background: var(--accent); color: #000; transform: scale(0.95); }

    .config-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 4, 6, 0.88);
      backdrop-filter: blur(16px);
      z-index: 3000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .config-popup {
      background: #14141a;
      border: 1px solid var(--border-hover);
      border-radius: 28px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-soft);
    }
    .config-popup h2 { font-size: 1.6rem; margin-bottom: 20px; text-align: center; color: var(--accent); font-weight: 700; }
    .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: rgba(255,255,255,0.02); padding: 10px 16px; border-radius: 14px; border: 1px solid var(--border-light); }
    .config-row label { font-size: 0.95rem; font-weight: 500; }
    .config-row button { background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); color: #fff; padding: 8px 16px; border-radius: 10px; cursor: pointer; min-width: 100px; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
    .config-row button:hover { background: rgba(255,255,255,0.12); border-color: var(--border-hover); }
    .add-btn-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-light); display: flex; gap: 12px; flex-direction: column; }
    .add-btn-section h4 { font-size: 1rem; color: #fff; font-weight: 600; }
    .add-btn-section input { background: rgba(0,0,0,0.4); border: 1px solid var(--border-light); padding: 10px 14px; border-radius: 10px; color: #fff; outline: none; font-size: 0.95rem; transition: border-color 0.2s; }
    .add-btn-section input:focus { border-color: var(--accent); }
    .add-btn-section button { background: var(--accent); color: #000; border: none; font-weight: 700; padding: 12px; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
    .add-btn-section button:hover { background: var(--accent-hover); }

    .search-card {
      width: 100%;
      max-width: 850px;
      margin-bottom: 3rem;
      border-radius: 24px;
      background: var(--panel-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-soft);
      transition: all 0.2s ease;
    }

    .search-card:focus-within {
      border-color: var(--border-hover);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
    }

    .search-box i {
      color: var(--text-soft);
      font-size: 1.1rem;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 500;
    }

    .sort-select {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sort-select:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border-hover);
    }

    .sort-select option {
      background: #111116;
      color: white;
    }

    .game-count-badge {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 700;
      background: rgba(245, 158, 11, 0.08);
      padding: 8px 16px;
      border-radius: 12px;
      white-space: nowrap;
      border: 1px solid rgba(245, 158, 11, 0.15);
    }

    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 24px;
      width: 100%;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 24px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid transparent;
    }

    .shortcut:hover, .shortcut.controller-selected {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--border-light);
    }
    
    .shortcut.controller-selected .shortcut-icon {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
    }

    .shortcut-icon {
      width: 130px;
      height: 130px;
      border-radius: 24px;
      background: var(--panel-bg);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.35);
    }

    .shortcut:hover .shortcut-icon {
      border-color: var(--border-hover);
    }

    .shortcut-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .shortcut-label {
      font-size: 0.95rem;
      color: #f1f5f9;
      font-weight: 600;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .standalone-frame-container {
      width: 100%;
      height: 75vh;
      background: var(--panel-bg);
      border-radius: 28px;
      border: 1px solid var(--border-light);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft);
    }

    .embedded-view-frame {
      width: 100%;
      flex: 1;
      border: none;
      background: #000;
    }

    .iframe-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 4, 6, 0.96);
      backdrop-filter: blur(20px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .iframe-controls {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 2100;
    }

    .iframe-controls button {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-light);
      color: var(--text);
      padding: 12px 28px;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }

    .iframe-controls button:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      transform: scale(1.05);
    }

    #iframeContainer {
      width: 95vw;
      height: 85vh;
      margin-top: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #iframeContainer iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border-light);
      border-radius: 24px;
      background: #000;
      box-shadow: var(--shadow-soft);
    }
    
    .modal-close-footer {
      margin-top: 24px;
      text-align: right;
    }
    .modal-close-footer button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 24px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-close-footer button:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>
  <div class="loader" id="loader"><div class="spinner"></div></div>

  <div class="config-popup-overlay" id="configPopup">
    <div class="config-popup">
      <h2>Controller Settings</h2>
      <div id="mappingRowsContainer"></div>
      
      <div class="add-btn-section">
        <h4>Add Custom Button</h4>
        <input type="text" id="newBtnName" placeholder="Button Label (e.g., Run)">
        <input type="text" id="newBtnKey" placeholder="Keyboard Key (e.g., Shift)">
        <button onclick="addNewCustomButton()">Create Button</button>
      </div>
      
      <div class="modal-close-footer">
        <button onclick="toggleSettingsMenu()">Save &amp; Close</button>
      </div>
    </div>
  </div>

  <div class="mobile-controls-overlay" id="mobileControls">
    <div class="dpad">
      <div class="dpad-btn dpad-up" data-id="ArrowUp"><i class="fa-solid fa-caret-up"></i></div>
      <div class="dpad-btn dpad-left" data-id="ArrowLeft"><i class="fa-solid fa-caret-left"></i></div>
      <div class="dpad-btn dpad-right" data-id="ArrowRight"><i class="fa-solid fa-caret-right"></i></div>
      <div class="dpad-btn dpad-down" data-id="ArrowDown"><i class="fa-solid fa-caret-down"></i></div>
    </div>
    <div class="action-buttons" id="actionButtonsContainer">
      <div class="action-btn" data-id="z">X<span class="btn-sub" id="sub-z">z</span></div>
      <div class="action-btn" data-id="x">Y<span class="btn-sub" id="sub-x">x</span></div>
      <div class="action-btn" data-id="c">A<span class="btn-sub" id="sub-c">c</span></div>
      <div class="action-btn" data-id="v">B<span class="btn-sub" id="sub-v">v</span></div>
    </div>
  </div>

  <nav class="navbar">
    <div class="nav-controls-left">
      <button class="mobile-toggle-btn" id="mobileToggleBtn" onclick="toggleMobileMode()" title="Toggle Mobile Controls">
        <i class="fa-solid fa-gamepad"></i>
      </button>
      <button class="settings-toggle-btn" id="settingsToggleBtn" onclick="toggleSettingsMenu()" title="Controller Settings">
        <i class="fa-solid fa-gear"></i>
      </button>
    </div>

    <button class="nav-btn active" onclick="changeView('home-view')"><i class="fa-solid fa-house"></i> Home</button>
    <button class="nav-btn" onclick="changeView('games-view')"><i class="fa-solid fa-gamepad"></i> Games</button>
    <button class="nav-btn" onclick="changeView('ai-view')"><i class="fa-solid fa-brain"></i> Riley AI</button>
  </nav>

  <div class="view-content active" id="home-view">
    <div class="clock-display" id="homeClock">00:00:00</div>
    <div class="date-display" id="homeDate">Loading date...</div>

    <div class="quick-stats">
      <div class="stat-card" style="cursor: pointer;" onclick="changeView('games-view')">
        <i class="fa-solid fa-gamepad"></i>
        <div id="statGameCount">0</div>
        <p>Games Configured</p>
      </div>
    </div>
  </div>

  <div class="view-content" id="games-view">
    <div class="title-section">
      <h1 class="title">PO.Games</h1>
    </div>

    <div class="search-card">
      <form class="search-box" id="searchForm" autocomplete="off" onsubmit="event.preventDefault();">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search games..." autocomplete="off">
        
        <select class="sort-select" id="sortSelect">
          <option value="alphabetical">A-Z</option>
          <option value="date">Newest</option>
        </select>

        <span class="game-count-badge" id="gameCount">0 games</span>
      </form>
    </div>

    <div class="shortcuts" id="gameList"></div>
  </div>

  <div class="view-content" id="ai-view">
    <div class="title-section">
      <h1 class="title">Riley AI</h1>
    </div>
    <div class="standalone-frame-container">
      <iframe class="embedded-view-frame" src="https://rileyai.edgeone.app/"></iframe>
    </div>
  </div>

  <div class="iframe-overlay" id="iframeOverlay">
    <div class="iframe-controls">
      <button id="closeBtn"><i class="fa-solid fa-xmark"></i> Close</button>
      <button id="fullscreenBtn"><i class="fa-solid fa-expand"></i> Fullscreen</button>
    </div>
    <div id="iframeContainer"></div>
  </div>

  <script>
    const $ = s => document.querySelector(s);

    const searchInput = $('#searchInput');
    const sortSelect = $('#sortSelect');
    const gameList = $('#gameList');
    const gameCount = $('#gameCount');
    const overlay = $('#iframeOverlay');
    const closeBtn = $('#closeBtn');
    const fullscreenBtn = $('#fullscreenBtn');
    const iframeContainer = $('#iframeContainer');

    let allGames = [];
    let currentFilteredGames = [];
    let originalGamesOrder = []; 
    let renderedStart = 0;
    const BATCH_SIZE = 65;
    let currentIframe = null;
    let currentGame = null;
    let scrollInterval = null;
    
    let selectedGameCardIndex = -1;

    let keyMappings = {
      "ArrowUp": "ArrowUp",
      "ArrowLeft": "ArrowLeft",
      "ArrowRight": "ArrowRight",
      "ArrowDown": "ArrowDown",
      "z": "z",
      "x": "x",
      "c": "c",
      "v": "v"
    };

    const premiumIntegrations = [
      { name: "CloudMoon", src: "https://google-classroom.sriail.workers.dev/", image: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=150&auto=format&fit=crop&q=60", description: "iframe", source: "cloudmoon" },
      { name: "Kryptonite Games", src: "https://kryptonite-games.edgeone.app/", image: "https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=150&auto=format&fit=crop&q=60", description: "iframe", source: "kryptonite" },
      { name: "My Games Archive", src: "https://mygamesarcive.edgeone.app/", image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=150&auto=format&fit=crop&q=60", description: "iframe", source: "archive" }
    ];

    function updateClock() {
      const now = new Date();
      $('#homeClock').innerText = now.toLocaleTimeString();
      $('#homeDate').innerText = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function toggleMobileMode() {
      const btn = $('#mobileToggleBtn');
      const controls = $('#mobileControls');
      btn.classList.toggle('active');
      controls.classList.toggle('visible');
    }

    function toggleSettingsMenu() {
      const popup = $('#configPopup');
      if (popup.style.display === 'flex') {
        popup.style.display = 'none';
      } else {
        buildSettingsRows();
        popup.style.display = 'flex';
      }
    }

    function buildSettingsRows() {
      const container = $('#mappingRowsContainer');
      container.innerHTML = '';
      Object.keys(keyMappings).forEach(btnId => {
        const row = document.createElement('div');
        row.className = 'config-row';
        row.innerHTML = `
          <label>Button <strong>${btnId}</strong></label>
          <button onclick="rebindButtonKey('${btnId}', this)">${keyMappings[btnId]}</button>
        `;
        container.appendChild(row);
      });
    }

    function rebindButtonKey(btnId, element) {
      element.innerText = "Press key...";
      const captureKey = (e) => {
        e.preventDefault();
        keyMappings[btnId] = e.key;
        element.innerText = e.key;
        
        const subtextLabel = document.getElementById(`sub-${btnId}`);
        if (subtextLabel) subtextLabel.innerText = e.key;
        
        window.removeEventListener('keydown', captureKey);
      };
      window.addEventListener('keydown', captureKey);
    }

    function addNewCustomButton() {
      const nameInput = $('#newBtnName');
      const keyInput = $('#newBtnKey');
      const label = nameInput.value.trim();
      const targetKey = keyInput.value.trim();

      if (!label || !targetKey) {
        alert("Please specify both a button label name and a map key target.");
        return;
      }

      const generatedId = "custom_" + label.toLowerCase().replace(/\s+/g, '_');
      keyMappings[generatedId] = targetKey;

      const newBtn = document.createElement('div');
      newBtn.className = 'action-btn';
      newBtn.setAttribute('data-id', generatedId);
      newBtn.innerHTML = `${label}<span class="btn-sub" id="sub-${generatedId}">${targetKey}</span>`;
      
      $('#actionButtonsContainer').appendChild(newBtn);
      attachInputEvents(newBtn);

      nameInput.value = '';
      keyInput.value = '';
      buildSettingsRows();
    }

    function handleControllerInput(btnId, eventType) {
      const mappedKeyName = keyMappings[btnId] || btnId;

      if (currentIframe) {
        try {
          const targetWindow = currentIframe.contentWindow;
          const eventConfig = { key: mappedKeyName, code: mappedKeyName, bubbles: true, cancelable: true };
          targetWindow.dispatchEvent(new KeyboardEvent(eventType, eventConfig));
          targetWindow.document.dispatchEvent(new KeyboardEvent(eventType, eventConfig));
        } catch (e) {
          document.dispatchEvent(new KeyboardEvent(eventType, { key: mappedKeyName, code: mappedKeyName, bubbles: true }));
        }
        return;
      }

      if (!currentIframe) {
        if (eventType === 'keydown') {
          if (btnId === 'ArrowUp' || btnId === 'ArrowDown') {
            if (!scrollInterval) {
              const amount = btnId === 'ArrowUp' ? -15 : 15;
              scrollInterval = setInterval(() => { window.scrollBy(0, amount); }, 16);
            }
          }
          
          if ($('#games-view').classList.contains('active')) {
            const visibleCards = document.querySelectorAll('#gameList .shortcut');
            if (visibleCards.length > 0) {
              if (btnId === 'ArrowLeft') {
                visibleCards.forEach(c => c.classList.remove('controller-selected'));
                selectedGameCardIndex = selectedGameCardIndex <= 0 ? visibleCards.length - 1 : selectedGameCardIndex - 1;
                visibleCards[selectedGameCardIndex].classList.add('controller-selected');
                visibleCards[selectedGameCardIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              } else if (btnId === 'ArrowRight') {
                visibleCards.forEach(c => c.classList.remove('controller-selected'));
                selectedGameCardIndex = (selectedGameCardIndex >= visibleCards.length - 1) ? 0 : selectedGameCardIndex + 1;
                visibleCards[selectedGameCardIndex].classList.add('controller-selected');
                visibleCards[selectedGameCardIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              } else if (btnId === 'c' && selectedGameCardIndex !== -1) {
                visibleCards[selectedGameCardIndex].click();
              }
            }
          }
        } else if (eventType === 'keyup') {
          if (btnId === 'ArrowUp' || btnId === 'ArrowDown') {
            clearInterval(scrollInterval);
            scrollInterval = null;
          }
        }
      }
    }

    function attachInputEvents(element) {
      const btnId = element.getAttribute('data-id');
      
      const startPress = (e) => {
        e.preventDefault();
        element.classList.add('active-press');
        handleControllerInput(btnId, 'keydown');
      };
      
      const endPress = (e) => {
        e.preventDefault();
        element.classList.remove('active-press');
        handleControllerInput(btnId, 'keyup');
      };

      element.addEventListener('mousedown', startPress);
      element.addEventListener('mouseup', endPress);
      element.addEventListener('touchstart', startPress, {passive: false});
      element.addEventListener('touchend', endPress, {passive: false});
    }

    document.querySelectorAll('.dpad-btn, .action-btn').forEach(attachInputEvents);

    function changeView(targetViewId) {
      document.querySelectorAll('.view-content').forEach(view => view.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      
      $('#' + targetViewId).classList.add('active');
      selectedGameCardIndex = -1; 
      
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(targetViewId)) {
          btn.classList.add('active');
        }
      });
    }

    function createFreshIframe() {
      iframeContainer.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.allow = 'autoplay; fullscreen; gamepad; accelerometer; gyroscope; pointer-lock; microphone';
      iframeContainer.appendChild(iframe);
      currentIframe = iframe;
      $('#mobileControls').classList.add('game-running');
      return iframe;
    }

    async function initMasterCatalog() {
      try {
        let poResponse = await fetch('https://raw.githubusercontent.com/933942-a11y/po.games2.0/refs/heads/main/data/games.json').then(res => res.json()).catch(() => []);
        const cleanPoGames = poResponse.filter(game => game.name !== "[!] REQUEST GAME").map(g => ({...g, source: "main"}));

        originalGamesOrder = [...premiumIntegrations, ...cleanPoGames];
        $('#statGameCount').innerText = originalGamesOrder.length;
        filterAndSortMasterList();
      } catch(err) {
        originalGamesOrder = [...premiumIntegrations];
        $('#statGameCount').innerText = originalGamesOrder.length;
        filterAndSortMasterList();
      }
    }

    function filterAndSortMasterList() {
      selectedGameCardIndex = -1;
      allGames = [...originalGamesOrder];

      const sortMethod = sortSelect.value;
      if (sortMethod === 'alphabetical') {
        allGames.sort((a, b) => a.name.localeCompare(b.name));
      } else if (sortMethod === 'date') {
        allGames.reverse();
      }

      if (searchInput.value.trim() !== '') {
        searchInput.dispatchEvent(new Event('input'));
      } else {
        gameCount.innerText = `${allGames.length} games`;
        renderBatch(true);
      }
    }

    sortSelect.addEventListener('change', filterAndSortMasterList);

    window.addEventListener('scroll', () => {
      const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 500;
      if (nearBottom && searchInput.value.trim() === '' && $('#games-view').classList.contains('active')) {
        renderBatch();
      }
    });

    function makeCardElement(item) {
      const a = document.createElement('a');
      a.className = 'shortcut';
      a.innerHTML = `
        <div class="shortcut-icon">
          <img loading="lazy" src="${item.image}" onerror="this.src='https://via.placeholder.com/100?text=App'">
        </div>
        <span class="shortcut-label">${item.name}</span>
      `;

      a.onclick = (e) => {
        e.preventDefault();
        currentGame = item;
        $('#loader').classList.add('show');
        overlay.style.display = 'flex';
        const iframe = createFreshIframe();
        
        const loadViaSrc = () => {
          iframe.src = item.src;
          iframe.onload = () => $('#loader').classList.remove('show');
          setTimeout(() => $('#loader').classList.remove('show'), 4000); 
        };

        if (item.description === "iframe" || item.src.includes('edgeone.app') || item.source === 'cloudmoon') {
          loadViaSrc();
        } else {
          fetch(item.src + "?t=" + Date.now())
            .then(r => {
              if (!r.ok) throw new Error('Network Block');
              return r.text();
            })
            .then(html => {
              const doc = iframe.contentDocument || iframe.contentWindow.document;
              doc.open(); doc.write(html); doc.close();
              $('#loader').classList.remove('show');
            })
            .catch(err => {
              loadViaSrc();
            });
        }
      };
      return a;
    }

    function renderBatch(reset = false) {
      if (reset) {
        gameList.innerHTML = '';
        renderedStart = 0;
      }
      const end = renderedStart + BATCH_SIZE;
      const slice = allGames.slice(renderedStart, end);
      slice.forEach(game => gameList.appendChild(makeCardElement(game)));
      renderedStart += BATCH_SIZE;
    }

    searchInput.addEventListener('input', () => {
      selectedGameCardIndex = -1;
      const q = searchInput.value.toLowerCase().trim();
      if (q === '') {
        gameCount.innerText = `${allGames.length} games`;
        renderBatch(true);
        return;
      }
      const filteredGames = allGames.filter(game => game.name.toLowerCase().includes(q));
      gameCount.innerText = `${filteredGames.length} found`;
      gameList.innerHTML = '';
      filteredGames.forEach(game => gameList.appendChild(makeCardElement(game)));
    });

    closeBtn.onclick = () => {
      overlay.style.display = 'none';
      if (currentIframe) currentIframe.src = 'about:blank';
      iframeContainer.innerHTML = '';
      currentIframe = null;
      currentGame = null;
      $('#mobileControls').classList.remove('game-running');
    };

    fullscreenBtn.onclick = () => {
      if (!currentGame) return;

      const win = window.open('about:blank', '_blank');
      if (!win) {
        alert("Popup blocker active!");
        return;
      }

      const doc = win.document;
      doc.documentElement.style.margin = '0';
      doc.documentElement.style.height = '100%';
      doc.body.style.margin = '0';
      doc.body.style.height = '100%';
      doc.body.style.overflow = 'hidden';

      const newIframe = doc.createElement('iframe');
      newIframe.style.width = '100vw';
      newIframe.style.height = '100vh';
      newIframe.style.border = 'none';
      newIframe.style.margin = '0';
      newIframe.allow = 'autoplay; fullscreen; gamepad; accelerometer; gyroscope; pointer-lock; microphone';

      const loadViaSrc = () => {
        newIframe.src = currentGame.src;
        doc.body.appendChild(newIframe);
      };

      if (currentGame.description === "iframe" || currentGame.src.includes('edgeone.app') || currentGame.source === 'cloudmoon') {
        loadViaSrc();
      } else {
        fetch(currentGame.src + "?t=" + Date.now())
          .then(r => {
            if (!r.ok) throw new Error('Network Block');
            return r.text();
          })
          .then(html => {
            doc.body.appendChild(newIframe);
            const newDoc = newIframe.contentDocument || newIframe.contentWindow.document;
            newDoc.open(); 
            newDoc.write(html); 
            newDoc.close();
          })
          .catch(err => {
            loadViaSrc();
          });
      }

      closeBtn.click();
    };

    initMasterCatalog();
  </script>

  <script>
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    
    function resize() { 
      canvas.width = window.innerWidth; 
      canvas.height = window.innerHeight; 
    }
    resize(); 
    window.addEventListener('resize', resize);

    let particles = [];
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.alpha = 0.1 + Math.random() * 0.2;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
        ctx.fill();
      }
    }
    
    for (let i = 0; i < 60; i++) particles.push(new Particle());
    
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
